<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>vmail</title>
<meta name="theme-color" content="#0c0c0c" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>

<!-- ───────────────────────── Login ───────────────────────── -->
<section id="login" class="login" hidden>
  <div class="login-card">
    <div class="brand">
      <span class="logo" aria-hidden="true"></span>
      <span class="wordmark">vmail</span>
    </div>
    <p class="login-sub">Sovereign mail. You own it.</p>
    <form id="login-form" autocomplete="on">
      <label class="field">
        <span>Email</span>
        <input id="login-user" type="email" inputmode="email" autocomplete="username" placeholder="you@vmail.test" required />
      </label>
      <label class="field">
        <span>Password</span>
        <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••••" required />
      </label>
      <button class="btn btn-primary btn-block" type="submit" id="login-btn">Sign in</button>
      <p class="login-err" id="login-err" hidden></p>
    </form>
  </div>
  <div class="login-glow" aria-hidden="true"></div>
</section>

<!-- ───────────────────────── App ───────────────────────── -->
<main id="app" class="app" hidden>
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="brand brand-sm">
      <span class="logo" aria-hidden="true"></span>
      <span class="wordmark">vmail</span>
    </div>
    <button class="btn btn-primary compose-btn" id="compose-btn" title="Compose (c)">
      <svg viewBox="0 0 24 24" class="ic"><path d="M4 20h4l10.5-10.5a2.1 2.1 0 0 0-3-3L5 17v3z" /><path d="M13.5 6.5l3 3" /></svg>
      Compose
    </button>
    <ul class="labels" id="labels"></ul>
    <div class="sidebar-foot">
      <div class="me" id="me"></div>
      <button class="iconbtn" id="settings-btn" title="Settings">
        <svg viewBox="0 0 24 24" class="ic"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 9 19.3a1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 4.7 9a1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      </button>
      <button class="iconbtn" id="logout" title="Sign out">
        <svg viewBox="0 0 24 24" class="ic"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
      </button>
    </div>
  </nav>

  <!-- Message list -->
  <section class="list-pane" id="list-pane">
    <header class="topbar">
      <div class="search">
        <svg viewBox="0 0 24 24" class="ic"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search" type="search" placeholder="Search mail   /" spellcheck="false" />
        <kbd class="search-kbd">/</kbd>
      </div>
      <button class="iconbtn" id="refresh" title="Refresh (g i)">
        <svg viewBox="0 0 24 24" class="ic"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
      </button>
    </header>
    <div class="list-head">
      <h1 id="list-title">Inbox</h1>
      <span class="list-count" id="list-count"></span>
    </div>
    <ol class="msglist" id="msglist" tabindex="0" aria-label="Messages"></ol>
    <div class="list-empty" id="list-empty" hidden></div>
  </section>

  <!-- Reading pane -->
  <section class="read-pane" id="read-pane">
    <div class="read-empty" id="read-empty">
      <span class="logo logo-xl" aria-hidden="true"></span>
      <p>Select a conversation</p>
      <p class="hint"><kbd>j</kbd><kbd>k</kbd> move · <kbd>Enter</kbd> open · <kbd>c</kbd> compose · <kbd>?</kbd> shortcuts</p>
    </div>
    <article class="read" id="read" hidden></article>
  </section>
</main>

<!-- Compose (template cloned into a dock) -->
<div class="compose-dock" id="compose-dock" aria-live="polite"></div>
<template id="compose-tpl">
  <div class="compose" role="dialog" aria-label="Compose message">
    <header class="compose-head">
      <span>New message</span>
      <div class="compose-head-actions">
        <button class="iconbtn min" title="Minimize">—</button>
        <button class="iconbtn close" title="Discard (Esc)">✕</button>
      </div>
    </header>
    <div class="compose-body">
      <label class="crow"><span>To</span><input class="c-to" type="text" placeholder="recipient@domain" /></label>
      <label class="crow"><span>Subject</span><input class="c-subj" type="text" placeholder="Subject" /></label>
      <textarea class="c-text" placeholder="Write something…"></textarea>
    </div>
    <footer class="compose-foot">
      <button class="btn btn-primary c-send">Send <kbd>⌘↵</kbd></button>
      <span class="c-status"></span>
    </footer>
  </div>
</template>

<!-- Shortcuts overlay -->
<div class="overlay" id="shortcuts" hidden>
  <div class="shortcuts-card">
    <h2>Keyboard shortcuts</h2>
    <div class="sc-grid" id="sc-grid"></div>
    <button class="btn btn-ghost" id="sc-close">Close</button>
  </div>
</div>

<!-- Settings -->
<div class="overlay" id="settings" hidden>
  <div class="settings-card">
    <h2>Settings</h2>
    <label class="field"><span>Signature</span><textarea id="set-sig" rows="3" placeholder="-- &#10;Alice · vmail"></textarea></label>
    <div class="set-section">
      <label class="switch"><input type="checkbox" id="set-vac" /> <span>Vacation responder</span></label>
      <div id="set-vac-fields">
        <label class="field"><span>Subject</span><input id="set-vac-subj" type="text" placeholder="Out of office" /></label>
        <label class="field"><span>Message</span><textarea id="set-vac-body" rows="3" placeholder="I'm away until…"></textarea></label>
      </div>
    </div>
    <div class="set-actions">
      <button class="btn btn-ghost" id="set-cancel">Cancel</button>
      <button class="btn btn-primary" id="set-save">Save</button>
    </div>
  </div>
</div>

<!-- Command palette -->
<div class="cmdk" id="cmdk" hidden>
  <div class="cmdk-box">
    <input class="cmdk-in" id="cmdk-in" placeholder="Type a command or jump to a label…" spellcheck="false" />
    <div class="cmdk-list" id="cmdk-list"></div>
  </div>
</div>

<div class="toast" id="toast" hidden></div>

<script src="./jmap.js"></script>
<script src="./app.js"></script>
</body>
</html>
