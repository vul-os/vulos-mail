# Run vulos-mail locally:  docker compose up --build
# Then exercise it from the host:
#   - MX (receive)   : localhost:2525   (SMTP, no auth)
#   - submission     : localhost:2587   (SMTP, AUTH PLAIN)
#   - IMAP           : localhost:2143
#   - JMAP           : http://localhost:2080/jmap/session  (HTTP Basic)
services:
  vulos-mail:
    build: .
    environment:
      VULOS_DOMAIN: vulos.to
      VULOS_ACCOUNT: alice@vulos.to
      VULOS_PASSWORD: alicepw
    ports:
      - "2525:2525" # MX
      - "2587:2587" # submission
      - "2143:2143" # IMAP
      - "2080:2080" # JMAP
    volumes:
      - vulos-mail-data:/data
volumes:
  vulos-mail-data:
